<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能考试系统</title>
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--success:#16a34a;--warning:#f59e0b;--danger:#dc2626;--bg:#f0f2f5;--card:#fff;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,#3730a3,#6366f1);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px}
.header h1{font-size:20px;font-weight:600;flex:1}
.header .sub{font-size:12px;opacity:.7}

.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;gap:0}
.nav-btn{padding:12px 18px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--text-muted);white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.nav-btn:hover{color:var(--primary);background:#f8fafc}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

.settings-tabs{display:flex;gap:0;margin-bottom:16px;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.settings-tab{flex:1;padding:12px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--text-muted);text-align:center;transition:all .15s;border-bottom:3px solid transparent}
.settings-tab:hover{background:#f8fafc;color:var(--primary)}
.settings-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;background:#f0f0ff}

.content{max-width:1200px;margin:0 auto;padding:20px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:15px}
.card-body{padding:20px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--primary)}
.stat-card .label{font-size:13px;color:var(--text-muted);margin-top:4px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{background:#f8fafc;font-weight:600;color:var(--text-muted);font-size:12px;text-transform:uppercase}
tr:hover{background:#f8fafc}
.click-row{cursor:pointer}

.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag-draft,.tag-manual{background:#fef3c7;color:#92400e}
.tag-published,.tag-ai,.tag-ai_template{background:#dbeafe;color:#1e40af}
.tag-completed{background:#dcfce7;color:#166534}
.tag-single_choice{background:#dcfce7;color:#166534}
.tag-fill_blank{background:#fef3c7;color:#92400e}
.tag-true_false{background:#e0e7ff;color:#3730a3}
.tag-short_answer{background:#fce7f3;color:#9d174d}
.tag-essay{background:#ffedd5;color:#9a3412}

.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:#f1f5f9}
.btn+.btn{margin-left:6px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.full-width{grid-column:1/-1}
.half{grid-column:span 1}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h2{font-size:18px}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);padding:4px;line-height:1}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}

.sub-tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--border)}
.sub-tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent}
.sub-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}

.toast{position:fixed;top:20px;right:20px;z-index:2000;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15);opacity:0;transform:translateY(-10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}

.hidden{display:none!important}

/* ========== 移动端适配 ========== */
@media(max-width:768px){
  .header{padding:10px 12px;gap:8px}
  .header h1{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .header .sub{display:none}
  .header #user-area{gap:4px;font-size:11px}
  .nav-btn{padding:10px 12px;font-size:13px}
  .content{padding:12px}
  .card-header{padding:10px 14px;font-size:14px;flex-wrap:wrap;gap:6px}
  .card-body{padding:12px}
  .form-grid{grid-template-columns:1fr!important}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-card{padding:12px}
  .stat-card .num{font-size:22px}
  table{font-size:12px}
  th,td{padding:6px 8px}
  .btn{padding:6px 12px;font-size:12px}
  .btn-sm{padding:4px 8px;font-size:11px}
  .modal{width:95%;max-width:95vw}
  .modal-body{padding:12px}
  .modal-header{padding:12px 14px}
  .modal-footer{padding:10px 14px}
  .settings-tab{padding:10px 6px;font-size:12px}
  .sub-tab{padding:6px 10px;font-size:12px}
  .half{grid-column:1/-1}
  /* 两栏/多栏网格改为单栏 */
  div[style*="grid-template-columns"]:not(.stats-grid):not(.form-grid){grid-template-columns:1fr!important}
  /* 答题选项 */
  .q-options{margin-left:8px!important}
  /* 弹窗内题目列表 */
  #aq-list label{padding:6px!important}
  #aq-list label div{font-size:12px!important}
  /* 筛选栏内select保持整行 */
  select[style*="min-width:100px"]{min-width:0!important;width:100%!important}
  /* 试卷列表：隐藏次要列，按钮换行 */
  .exam-table th:nth-child(2),.exam-table td:nth-child(2),
  .exam-table th:nth-child(3),.exam-table td:nth-child(3),
  .exam-table th:nth-child(5),.exam-table td:nth-child(5),
  .exam-table th:nth-child(6),.exam-table td:nth-child(6){display:none}
  .exam-table td:last-child{white-space:normal!important;max-width:180px}
  .exam-table td:last-child .btn{display:inline-block;margin:2px!important}
  /* 试卷详情弹窗：信息改为2列，按钮换行 */
  .exam-detail-info{grid-template-columns:1fr 1fr!important;font-size:12px!important}
  .exam-detail-info div{font-size:12px}
  /* 一键选题弹窗：每题型一行 */
  .auto-pick-grid{grid-template-columns:1fr!important}
}

@media(max-width:480px){
  .header{padding:8px 10px}
  .header h1{font-size:13px}
  .nav-btn{padding:8px 8px;font-size:12px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stat-card{padding:8px}
  .stat-card .num{font-size:18px}
  .stat-card .label{font-size:11px}
  .settings-tab{font-size:11px;padding:8px 4px}
  th,td{padding:4px 6px;font-size:11px}
  .btn,.btn-sm{padding:4px 6px;font-size:11px}
  .tag{font-size:10px;padding:1px 6px}
}
.print-area{padding:20px;font-size:14px;line-height:1.8}
.print-area h2{text-align:center;margin-bottom:20px;font-size:18px}
.print-area .q-block{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.print-area .q-block:last-child{border-bottom:none}
.print-area .q-num{font-weight:600;margin-bottom:6px}
.print-area .q-options{margin:6px 0 6px 20px}

.print-area .q-explanation{color:var(--text-muted);font-size:12px;margin-top:4px}
.q-card input[type=radio],.q-card input[type=checkbox]{margin-right:6px;transform:scale(1.2)}.q-card label:hover{background:#f8fafc}
@media print{body{background:#fff}.nav,.header .sub,.btn,.modal-overlay,.toast{display:none!important}.content{max-width:100%;padding:0}.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}}
</style>
</head>
<body>
<div class="header">
  <div style="font-size:24px">🎓</div>
  <h1>AI 智能考试系统</h1>
  <span class="sub" id="clock"></span>
  <div id="user-area" style="display:flex;align-items:center;gap:8px;font-size:13px">
    <span id="user-info" style="display:none"></span>
    <button class="btn btn-sm btn-outline" id="login-btn" onclick="showLogin();return false" style="border-color:rgba(255,255,255,.3);color:#fff;cursor:pointer">登录</button>
    <button class="btn btn-sm btn-outline" id="register-btn" onclick="showRegister();return false" style="border-color:rgba(255,255,255,.3);color:#fff;cursor:pointer">注册</button>
    <button class="btn btn-sm btn-outline" id="logout-btn" onclick="logout()" style="border-color:rgba(255,255,255,.3);color:#fff;display:none">退出</button>
  </div>
</div>

<nav class="nav" id="mainNav">
  <button class="nav-btn active" data-page="dashboard">📊 看板</button>
  <button class="nav-btn" data-page="questions">📝 题库</button>
  <button class="nav-btn" data-page="generate">🤖 AI 生成</button>
  <button class="nav-btn" data-page="exams">📋 试卷</button>

  <button class="nav-btn" data-page="resources">📂 资源导入</button>
  <button class="nav-btn" data-page="scores">📊 成绩</button>
  <button class="nav-btn" data-page="settings">⚙️ 设置</button>
</nav>

<div class="content" id="pageContent"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">标题</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='/api';let _examsData=[],_questionsData=[],_subjects=[],_grades=[];
function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function toast(msg,t='success'){const t2=$('#toast');t2.textContent=msg;t2.className='toast toast-'+t+' show';setTimeout(()=>t2.classList.remove('show'),2500)}
function closeModal(){$('#modalOverlay').classList.remove('show')}
function openModal(title,bodyHtml,footerHtml=''){
  $('#modalTitle').textContent=title;$('#modalBody').innerHTML=bodyHtml;$('#modalFooter').innerHTML=footerHtml;
  $('#modalOverlay').classList.add('show')
}
async function api(m,url,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(API+url,o);return r.json()}
function tag(t,c){return `<span class="tag tag-${c}">${t}</span>`}
function fmtDT(dt){if(!dt)return '-';const p=dt.replace('T',' ').split(/[- :]/);if(p.length>=6)return `${p[0]}年${p[1]}月${p[2]}日 ${p[3]}:${p[4]}`;return dt.slice(0,16)}
const typeMap={'single_choice':'单选题','multiple_choice':'多选题','fill_blank':'填空题','true_false':'判断题','short_answer':'简答题','essay':'作文/论述'};
const stageMap={'primary':'小学','middle':'初中','high':'高中'};

function updateClock(){const n=new Date();$('#clock').textContent=n.toLocaleString('zh-CN',{hour12:false})}
setInterval(updateClock,1000);updateClock();

let currentPage='dashboard';
function navigateTo(page){
  $$('.nav-btn').forEach(x=>x.classList.remove('active'));
  const target=document.querySelector(`.nav-btn[data-page="${page}"]`);
  if(target)target.classList.add('active');
  currentPage=page;
  renderPage(page);
}

$$('.nav-btn').forEach(b=>{b.addEventListener('click',()=>{navigateTo(b.dataset.page)})});

let _settingsTab = 'system';

async function renderPage(page){
  const el=$('#pageContent');
  switch(page){
    case 'dashboard':return renderDashboard(el);
    case 'questions':return renderQuestions(el);
    case 'generate':return renderGenerate(el);
    case 'exams':return renderExams(el);

    case 'resources':return renderResources(el);
    case 'login':return renderLogin(el);
    case 'user-mgr':_settingsTab='user-mgr';return renderSettings(el);
    case 'students':_settingsTab='students';return renderSettings(el);
    case 'scores':return renderScores(el);
    case 'settings':return renderSettings(el);
  }
}

// ========== 看板 ==========
async function renderDashboard(el){
  const s=await api('GET','/stats');
  el.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${s.total_questions.c}</div><div class="label">总题目</div></div>
      <div class="stat-card"><div class="num" style="color:var(--success)">${s.total_exams.c}</div><div class="label">试卷</div></div>
      ${(s.by_source||[]).map(x=>`<div class="stat-card"><div class="num" style="font-size:20px">${x.c}</div><div class="label">${x.source==='ai'||x.source==='ai_template'?'🤖 AI生成':x.source==='manual'?'✍️ 手动录入':'📥 导入'}</div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card"><div class="card-header">📊 题型分布</div><div class="card-body">${renderChart((s.by_type||[]).map(x=>[typeMap[x.type]||x.type,x.c]))}</div></div>
      <div class="card"><div class="card-header">🤖 AI生成 vs 手动</div><div class="card-body">${renderChart((s.by_source||[]).map(x=>[x.source==='ai'||x.source==='ai_template'?'AI生成':x.source==='manual'?'手动录入':'导入',x.c]))}</div></div>
    </div>
    <div class="card"><div class="card-header">📋 最近试卷</div>
      <div class="card-body table-wrap"><table>
        <thead><tr><th>试卷名称</th><th>学科</th><th>题目数</th><th>状态</th><th>创建时间</th></tr></thead>
        <tbody>${s.recent_exams.map(e=>`<tr class="click-row" onclick="showExamDetail(${e.id})"><td><strong>${e.title}</strong></td><td>${e.subject_name}</td><td>${e.question_count||0}题</td><td>${tag(e.status==="draft"?"草稿":e.status==="published"?"已发布":e.status,e.status)}</td><td>${fmtDT(e.created_at)}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">暂无试卷</td></tr>'}</tbody>
      </table></div>
    </div>`;
}
function renderChart(data){
  if(!data||!data.length)return '<p style="color:var(--text-muted)">暂无数据</p>';
  const total=data.reduce((s,x)=>s+x[1],0);
  return data.map(([label,val])=>{
    const p=total?Math.round(val/total*100):0;
    return `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px"><span>${label}</span><span>${val}题 (${p}%)</span></div><div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="height:100%;width:${p}%;background:var(--primary);border-radius:4px"></div></div></div>`
  }).join('');
}

// ========== 题库 ==========
async function renderQuestions(el){if(!el)el=$('#pageContent');
  const [subjects,grades]=await Promise.all([api('GET','/subjects'),api('GET','/grades')]);
  const sid=$('#q-filter-subject')?.value||'';
  const gid=$('#q-filter-grade')?.value||'';
  const typ=$('#q-filter-type')?.value||'';
  let url='/questions';
  const params=[];if(sid){params.push('subject_id='+sid);url+='?'+params.join('&')}
  if(gid)url+=(url.includes('?')?'&':'?')+'grade_id='+gid;
  if(typ)url+=(url.includes('?')?'&':'?')+'type='+typ;
  const questions=await api('GET',url);
  _questionsData=questions;

  el.innerHTML=`
    <div class="card"><div class="card-header">🔍 筛选</div>
      <div class="card-body"><div class="form-grid" style="grid-template-columns:1fr 1fr 1fr auto">
        <div class="form-group"><label>学科</label><select id="q-filter-subject" onchange="renderQuestions()"><option value="">全部</option>${subjects.map(s=>`<option value="${s.id}" ${sid==s.id?'selected':''}>${s.icon}${s.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>学段</label><select id="q-filter-grade" onchange="renderQuestions()"><option value="">全部</option>${grades.map(g=>`<option value="${g.id}" ${gid==g.id?'selected':''}>${g.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>题型</label><select id="q-filter-type" onchange="renderQuestions()"><option value="">全部</option>${Object.entries(typeMap).map(([k,v])=>`<option value="${k}" ${typ==k?'selected':''}>${v}</option>`).join('')}</select></div>
        <div style="align-self:end"><button class="btn btn-primary" onclick="showAddQuestion()">＋ 添加题目</button></div>
      </div></div>
    </div>
    <div class="card"><div class="card-header">
      <span>题库 (${questions.length}题)</span>
      <span>
        <span id="q-batch-bar" style="display:none;font-size:13px;color:var(--text-muted);margin-right:8px">已选 <span id="q-sel-count">0</span> 题</span>
        ${_authUser&&_authUser.role==='admin'?`<button id="q-batch-del-btn" class="btn btn-sm btn-danger" onclick="batchDeleteQuestions()" style="display:none">🗑️ 批量删除</button>`:''}
      </span>
    </div>
      <div class="card-body table-wrap"><table>
        <thead><tr>${_authUser&&_authUser.role==='admin'?`<th style="width:36px"><input type="checkbox" id="q-select-all" onchange="toggleAllQuestions(this.checked)"></th>`:''}<th>题型</th><th>题目</th><th>学科</th><th>学段</th><th>难度</th><th>分值</th><th>来源</th><th>操作</th></tr></thead>
        <tbody>${questions.map(q=>`<tr id="q-row-${q.id}">${_authUser&&_authUser.role==='admin'?`<td style="text-align:center"><input type="checkbox" class="q-row-cb" value="${q.id}" onchange="updateBatchBar()"></td>`:''}<td>${tag(typeMap[q.type]||q.type,q.type)}</td><td>${q.stem.length>40?q.stem.slice(0,40)+'...':q.stem}</td><td>${q.subject_name||'-'}</td><td>${q.grade_name||'-'}</td><td>${'⭐'.repeat(q.difficulty||3)}</td><td>${q.points||5}分</td><td>${tag(q.source==="manual"?"手动录入":q.source==="ai"?"AI生成":q.source==="ai_template"?"AI生成(模板)":q.source,q.source)}</td><td><button class="btn btn-sm btn-outline" onclick="showQuestionDetail(${q.id})">查看</button>${_authUser&&_authUser.role==='admin'?`<button class="btn btn-sm btn-danger" onclick="deleteQuestion(${q.id})">删除</button>`:''}</td></tr>`).join('')||'<tr><td colspan="9" style="text-align:center;color:var(--text-muted)">暂无题目</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

async function showAddQuestion(){_subjects=await api('GET','/subjects');_grades=await api('GET','/grades');
  openModal('添加题目',`
    <div class="form-grid">
      <div class="form-group"><label>题型 *</label><select id="aq-type"><option value="single_choice">单选题</option><option value="multiple_choice">多选题</option><option value="fill_blank">填空题</option><option value="true_false">判断题</option><option value="short_answer">简答题</option><option value="essay">作文/论述</option></select></div>

function toggleAllQuestions(checked){
  document.querySelectorAll('.q-row-cb').forEach(cb=>cb.checked=checked);
  updateBatchBar();
}

function updateBatchBar(){
  const checked=document.querySelectorAll('.q-row-cb:checked');
  const count=checked.length;
  const bar=document.getElementById('q-batch-bar');
  const btn=document.getElementById('q-batch-del-btn');
  const cnt=document.getElementById('q-sel-count');
  if(cnt)cnt.textContent=count;
  if(bar)bar.style.display=count>0?'inline':'none';
  if(btn)btn.style.display=count>0?'inline-flex':'none';
}

async function batchDeleteQuestions(){
  const checked=document.querySelectorAll('.q-row-cb:checked');
  const ids=[...checked].map(cb=>parseInt(cb.value));
  if(!ids.length)return toast('请选择题目','error');
  if(!confirm('确定删除选中的 '+ids.length+' 道题？此操作不可恢复！'))return;
  // 逐个删除
  for(const id of ids){
    await api('DELETE','/questions/'+id);
    const row=document.getElementById('q-row-'+id);
    if(row)row.style.opacity='0.3';
  }
  toast('已删除 '+ids.length+' 道题');
  setTimeout(()=>renderPage('questions'),500);
}

async function generateQuestions(){
  const btn=$('#gen-btn');btn.disabled=true;btn.innerHTML='⏳ 生成中...';
  const sid=$('#gen-subject').value;if(!sid){toast('请选择学科','error');btn.disabled=false;btn.innerHTML='🤖 AI 生成题目';return}
  const subjects=await api('GET','/subjects');
  const grades=await api('GET','/grades');
  const sName=subjects.find(x=>x.id==sid)?.name||'';
  const gid=$('#gen-grade').value;
  const gName=gid?grades.find(x=>x.id==gid)?.name||'':'';
  try{
    const r=await api('POST','/ai/generate',{
      subject_id:parseInt(sid),grade_id:gid?parseInt(gid):null,
      question_type:$('#gen-type').value,count:parseInt($('#gen-count').value)||5,
      difficulty:parseInt($('#gen-difficulty').value),knowledge_point:$('#gen-kp').value,
      subject_name:sName,grade_name:gName
    });
    if(r.error==='NO_API_KEY'){
      toast('请先在设置中配置 DeepSeek API Key','error');
      $('#gen-result').innerHTML='<div style="padding:20px;text-align:center;background:#fef2f2;border-radius:8px;font-size:15px">⚠️ 未配置API Key<br><span style="font-size:13px;color:var(--text-muted)">请到「⚙️ 设置」配置 DeepSeek API Key</span></div>';
      btn.disabled=false;btn.innerHTML='🤖 AI 生成题目';return;
    }
    if(r.error){
      toast('AI生成失败: '+r.message,'error');
      $('#gen-result').innerHTML='<div style="padding:20px;text-align:center;background:#fef2f2;border-radius:8px">❌ '+r.message+'</div>';
      btn.disabled=false;btn.innerHTML='🤖 AI 生成题目';return;
    }
    toast('✅ 成功生成 '+r.count+' 道题');
    let html='<div style="padding:12px;background:#f0fdf4;border-radius:8px;margin-bottom:12px"><strong>✅ 生成 '+r.count+' 道题目</strong><br><span style="font-size:12px;color:var(--text-muted)">来源: '+(r.api_source||'AI')+'</span></div>';
    (r.questions||[]).forEach((q,i)=>{
      html+='<div class="q-block" style="padding:10px;margin-bottom:8px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-weight:600;margin-bottom:4px">'+(i+1)+'. '+q.stem+'</div>'
        +(q.options?'<div style="margin-left:16px;font-size:13px">'+q.options.map((o,j)=>'<div>'+String.fromCharCode(65+j)+'. '+o+'</div>').join('')+'</div>':'')
        +'<div style="color:var(--success);font-size:13px;margin-top:4px">✅ '+q.answer+'</div>'
        +(q.explanation?'<div style="color:var(--text-muted);font-size:12px;margin-top:2px">📖 '+q.explanation+'</div>':'')+'</div>';
    });
    $('#gen-result').innerHTML=html;
  }catch(e){toast('生成失败: '+e.message,'error')}
  btn.disabled=false;btn.innerHTML='🤖 AI 生成题目';
}

async function randomAddQuestionsToExam(examId) {
  const count = parseInt(document.getElementById('aq-random-count')?.value || '5');
  if (!count || count < 1) return toast('请输入有效的随机题数', 'error');
  
  const checkboxes = [...document.querySelectorAll('.q-select')];
  // 从已渲染的题目列表获取所有可选题目的ID
  const allFilteredIds = checkboxes.map(cb => parseInt(cb.value));
  
  if (allFilteredIds.length === 0) return toast('当前筛选条件下没有可选的题目', 'error');
  if (allFilteredIds.length < count) return toast('当前筛选结果只有 ' + allFilteredIds.length + ' 题，不够随机 ' + count + ' 题', 'error');
  
  // Fisher-Yates shuffle 取前N个
  const shuffled = [...allFilteredIds];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const selectedIds = shuffled.slice(0, count);
  
  await api('POST', '/exams/' + examId + '/questions', { question_ids: selectedIds });
  toast('🎲 已随机添加 ' + selectedIds.length + ' 道题');
  closeModal();
  showExamDetail(examId);
}

async function showAutoPickQuestions(examId){
  const [exam, allQuestions] = await Promise.all([
    api('GET','/exams/'+examId),
    api('GET','/questions?limit=500')
  ]);
  const existingIds=new Set(exam.questions.map(q=>q.id));
  const linkedSubject=exam.subject_id;
  const linkedGrade=exam.grade_id;
  // 按题型统计可用题目数
  const avail={};
  const typeKeys=['single_choice','multiple_choice','true_false','fill_blank','short_answer','essay'];
  typeKeys.forEach(t=>avail[t]=0);
  allQuestions.forEach(q=>{
    if(existingIds.has(q.id)) return;
    if(linkedSubject && q.subject_id!=linkedSubject) return;
    if(linkedGrade && q.grade_id!=linkedGrade) return;
    if(avail[q.type]!==undefined) avail[q.type]++;
  });
  openModal('🎲 一键选题',
    '<div style="margin-bottom:12px;padding:10px 14px;background:#f0f9ff;border-radius:8px;font-size:13px">设置每种题型的数量，系统从题库中随机抽取</div>'+
    '<div class="form-grid">'+
    typeKeys.map(t=>'<div class="form-group"><label>'+typeMap[t]+'<span style="font-weight:400;color:#999;margin-left:6px">(可用'+avail[t]+'题)</span></label><input id="ap-'+t+'" type="number" min="0" max="'+avail[t]+'" value="0" style="font-size:15px;padding:10px;width:100%"></div>').join('')+
    '</div>',
    '<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-warning" onclick="confirmAutoPickQuestions('+examId+')">🎲 一键选题</button>'
  );
}

async function confirmAutoPickQuestions(examId){
  const [exam, allQuestions] = await Promise.all([
    api('GET','/exams/'+examId),
    api('GET','/questions?limit=500')
  ]);
  const existingIds=new Set(exam.questions.map(q=>q.id));
  const linkedSubject=exam.subject_id;
  const linkedGrade=exam.grade_id;
  
  const typeKeys=['single_choice','multiple_choice','true_false','fill_blank','short_answer','essay'];
  const selected=[];
  
  typeKeys.forEach(t=>{
    const count=parseInt(document.getElementById('ap-'+t)?.value)||0;
    if(count<=0) return;
    // 筛选该题型所有可用题目
    const pool=allQuestions.filter(q=>{
      if(existingIds.has(q.id)) return false;
      if(q.type!==t) return false;
      if(linkedSubject && q.subject_id!=linkedSubject) return false;
      if(linkedGrade && q.grade_id!=linkedGrade) return false;
      return true;
    });
    if(pool.length===0) return;
    // Fisher-Yates shuffle取前N个
    const shuffled=[...pool];
    for(let i=shuffled.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    const pick=shuffled.slice(0,Math.min(count,pool.length));
    pick.forEach(q=>{selected.push(q.id);existingIds.add(q.id)});
  });
  
  if(selected.length===0) return toast('没有符合条件的题目','error');
  await api('POST','/exams/'+examId+'/questions',{question_ids:selected});
  toast('🎲 已添加 '+selected.length+' 道题（'+typeKeys.filter(t=>parseInt(document.getElementById('ap-'+t)?.value)||0).map(t=>typeMap[t]+' '+Math.min(parseInt(document.getElementById('ap-'+t)?.value)||0,allQuestions.filter(q=>q.type===t&&!existingIds.has(q.id)).length)+'题').join('、')+'）');
  closeModal();
  showExamDetail(examId);
}

  // Group by type
  const grouped={};
  exam.questions.forEach((q,i)=>{const t=q.type;if(!grouped[t])grouped[t]=[];grouped[t].push({...q,idx:i+1})});

  for(const [type,typeLabel] of Object.entries(groups)){

    for(let r=0; r<22; r++){

let _authToken = localStorage.getItem('exam_token') || '';

async function checkAuth() {
  try {
    const r = await fetch('/api/auth/me', {
      headers: _authToken ? { 'Authorization': 'Bearer ' + _authToken } : {}
    });
    const data = await r.json();
    if (data.logged_in) {
      _authUser = data;
      $('#user-info').textContent = '👤 ' + (data.display_name || data.username) + ' (' + (data.role || '') + ')';
      $('#user-info').style.display = 'inline';
      $('#login-btn').style.display = 'none';
      $('#register-btn').style.display = 'none';
      $('#logout-btn').style.display = 'inline';
      // 管理员显示用户管理按钮
          // 用户管理按钮现在集成在设置页中，登录后由设置页动态控制
      _authChecked = true;
      // 如果当前显示的是登录页，跳转到看板
      if (currentPage === 'login') renderPage('dashboard');
      else renderPage(currentPage);
    } else {
      _authUser = null;
      _authChecked = false;
      $('#user-info').style.display = 'none';
      $('#login-btn').style.display = 'inline';
      $('#register-btn').style.display = 'inline';
      $('#logout-btn').style.display = 'none';
      const umBtn = $('#nav-user-mgr');
      if (umBtn) umBtn.style.display = 'none';
      // 未登录显示登录页
      if (currentPage !== 'login') {
        currentPage = 'login';
        renderPage('login');
      }
    }
  } catch(e) { console.log('Auth check failed', e); }

// Override api function to include auth token
const _origApi = api;
api = async function(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (_authToken) opts.headers['Authorization'] = 'Bearer ' + _authToken;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + url, opts);
  const data = await r.json();
  if (r.status === 401 && data.error && data.error.includes('登录')) {
    _authToken = '';
    localStorage.removeItem('exam_token');
    _authUser = null;
    checkAuth();
    toast('登录已过期，请重新登录','error');
  }
  return data;
};

// Check auth on load
// 启动时检查登录状态，决定显示登录页还是看板
(function init() {
  const saved = localStorage.getItem('exam_token');
  if (saved) {
    _authToken = saved;
    // 尝试直接用token加载看板
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + saved } })
      .then(r => r.json())
      .then(data => {
        if (data.logged_in) {
          _authUser = data;
          $('#user-info').textContent = '👤 ' + (data.display_name || data.username) + ' (' + (data.role || '') + ')';
          $('#user-info').style.display = 'inline';
          $('#login-btn').style.display = 'none';
          $('#register-btn').style.display = 'none';
          $('#logout-btn').style.display = 'inline';
          // 用户管理已集成到设置页
          _authChecked = true;
          renderPage('dashboard');
        } else {
          localStorage.removeItem('exam_token');
          _authToken = '';
          renderPage('login');
        }
      })
      .catch(() => renderPage('login'));
  } else {
    renderPage('login');
  }
})();

async function refreshScoreStats() {

  const data = await api('GET', url);

  if (!el) return;

  const s = data.summary || {};
  el.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">
      <div class="stat-card"><div class="num">${s.student_count||0}</div><div class="label">参考人数</div></div>

      <div class="stat-card"><div class="num" style="color:var(--danger)">${s.min_score||'-'}</div><div class="label">最低分</div></div>
      <div class="stat-card"><div class="num">${s.avg_pct?s.avg_pct+'%':'-'}</div><div class="label">平均得分率</div></div>
    </div>
    <div style="margin-top:12px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">等级分布</div>
      ${(data.distribution||[]).map(d => {
        const total = (data.distribution||[]).reduce((a,b) => a + b.count, 0);
        const pct = total ? Math.round(d.count/total*100) : 0;
        const colors = {'A (90-100)':'var(--success)','B (80-89)':'var(--primary)','C (70-79)':'var(--warning)','D (60-69)':'#f97316','E (<60)':'var(--danger)'};
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:13px">'
          +'<span style="width:80px">'+d.level+'</span>'
          +'<div style="flex:1;height:20px;background:#e2e8f0;border-radius:4px;overflow:hidden">'
          +'<div style="height:100%;width:'+pct+'%;background:'+(colors[d.level]||'var(--primary)')+';border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:'+(pct>15?'#fff':'transparent')+'">'+pct+'%</div></div>'

      <div class="form-group"><label>状态</label><select id="eu-active" style="font-size:15px;padding:10px">
        <option value="1" ${u.active?'selected':''}>正常</option>
        <option value="0" ${!u.active?'selected':''}>停用</option>
      </select></div>
    </div>
  `, '<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmEditUser('+id+')">保存</button>');
}
async function confirmEditUser(id) {
  const body = {
    display_name: document.getElementById('eu-name').value,
    role: document.getElementById('eu-role').value,
    active: parseInt(document.getElementById('eu-active').value)
  };
  const pass = document.getElementById('eu-pass').value;
  if (pass) body.password = pass;
  await api('PUT','/users/'+id, body);
  toast('已更新'); closeModal(); _settingsTab='user-mgr'; renderPage('settings');
}

async function deleteUser(id) {
  if (!confirm('确定永久删除此用户？此操作不可恢复！')) return;
  await api('DELETE','/users/'+id);
  toast('已删除'); _settingsTab='user-mgr'; renderPage('settings');
}


// ========== 设置 ==========
async function renderSettings(el){
  const isAdmin = _authUser && _authUser.role === 'admin';
  // 非管理员默认跳转到学员管理
  if(!isAdmin && _settingsTab === 'system') _settingsTab = 'students';
  const tab = _settingsTab;
  let tabsHtml = '<div class="settings-tabs">';
  if(isAdmin){
    tabsHtml += '<button class="settings-tab' + (tab==='system'?' active':'') + '" onclick="switchSettingsTab(\'system\')">⚙️ 系统设置</button>';
  }
  tabsHtml += '<button class="settings-tab' + (tab==='students'?' active':'') + '" onclick="switchSettingsTab(\'students\')">👨‍🎓 学员管理</button>';
  if(isAdmin){
    tabsHtml += '<button class="settings-tab' + (tab==='user-mgr'?' active':'') + '" onclick="switchSettingsTab(\'user-mgr\')">👑 用户管理</button>';
  }
  tabsHtml += '</div><div id="settings-tab-content"></div>';
  el.innerHTML = tabsHtml;
  await renderSettingsTab(tab);
}

async function switchSettingsTab(tab){
  _settingsTab = tab;
  renderSettings(document.getElementById('pageContent'));
}

async function renderSettingsTab(tab){
  const content = document.getElementById('settings-tab-content');
  if(!content) return;
  const isAdmin = _authUser && _authUser.role === 'admin';
  // 非管理员无权查看系统设置
  if(tab === 'system' && !isAdmin) tab = 'students';
  if(tab === 'user-mgr' && !isAdmin) tab = 'students';
  switch(tab){
    case 'system': return renderSystemSettings(content);
    case 'students': return renderStudents(content);
    case 'user-mgr': return renderUserMgr(content);
  }
}

async function renderSystemSettings(el){
  const s=await api('GET','/settings/deepseek_api_key');
  el.innerHTML=`
    <div class="card"><div class="card-header">⚙️ 系统设置</div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>🔑 DeepSeek API Key</label>
            <input id="set-api-key" type="password" value="`+(s.value||'')+`" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" style="font-size:14px;padding:10px">
            <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">
              用于AI生成题目。可在 <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:var(--primary)">platform.deepseek.com</a> 获取。
              也可通过环境变量 DEEPSEEK_API_KEY 设置。
            </div>
          </div>
          <div class="form-group full-width">
            <label>🔧 测试连接</label>
            <button class="btn btn-outline" onclick="testApiKey()">测试API连接</button>
            <span id="api-test-result" style="margin-left:12px;font-size:13px"></span>
          </div>
          <div class="form-group full-width">
            <button class="btn btn-primary" onclick="saveApiKey()">💾 保存设置</button>
          </div>
        </div>
      </div>
    </div>`;
}

async function saveApiKey(){
  const val=$('#set-api-key').value;
  await api('POST','/settings',{key:'deepseek_api_key',value:val});
  toast('API Key 已保存');
}

async function testApiKey(){
  const key=$('#set-api-key').value;if(!key)return toast('请先输入API Key','error');
  const el=$('#api-test-result');el.innerHTML='⏳ 测试中...';
  try{
    const r=await fetch('https://api.deepseek.com/v1/models',{headers:{'Authorization':'Bearer '+key}});
    if(r.ok){el.innerHTML='✅ DeepSeek连接成功';toast('DeepSeek连接成功 ✅')}
    else{
      const e=await r.json();
      el.innerHTML='❌ 失败: '+(e.error?.message||'HTTP '+r.status);
      toast('DeepSeek测试失败','error');
    }
  }catch(e){el.innerHTML='❌ 网络错误: '+e.message;toast('网络连接失败','error')}
}

</script>
